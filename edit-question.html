<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор вопроса</title>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.31.5/dist/editorjs.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.8/dist/header.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.9/dist/editorjs-list.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.10.3/dist/image.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@2.11.7/dist/paragraph.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 1.5rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: #3b82f6; text-decoration: none; }
        .card { background: white; border-radius: 32px; padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { font-weight: 500; display: block; margin-bottom: 0.3rem; }
        input[type="text"] { width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 20px; }
        .editor-wrapper { border: 1px solid #e2e8f0; border-radius: 24px; padding: 0.5rem; }
        #editorjs { background: white; border-radius: 20px; }
        .answers-section { background: #f9fafb; border-radius: 24px; padding: 1.2rem; margin-top: 1rem; }
        .answer-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .answer-text { flex: 1; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 30px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
        .action-buttons { display: flex; gap: 15px; justify-content: flex-end; margin-top: 2rem; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <a href="manage-test.html" class="back-link" id="backLink">← Назад к тесту</a>
    <div class="card">
        <h2 id="formTitle">Создание вопроса</h2>
        <div class="form-group">
            <label>Заголовок вопроса</label>
            <input type="text" id="questionTitle">
        </div>
        <div class="form-group">
            <label>Текст вопроса</label>
            <div class="editor-wrapper"><div id="editorjs"></div></div>
        </div>
        <div class="answers-section">
            <label>Варианты ответов</label>
            <div id="answersList"></div>
            <button type="button" id="addAnswerBtn" class="btn-outline">Добавить вариант</button>
        </div>
        <div><label class="checkbox-label"><input type="checkbox" id="fileRequiredCheckbox"> Требуется прикрепление файла</label></div>
        <div class="action-buttons">
            <button class="btn-outline" id="cancelBtn">Отмена</button>
            <button class="btn" id="saveBtn">Сохранить</button>
        </div>
    </div>
</div>

<script src="db.js"></script>
<script>
    (function(){
        if (!sessionStorage.getItem('teacherAuth')) window.location.href = 'index.html';

        let db;
        let editor;
        let testId;
        let questionId = null;
        let currentAnswers = [];

        const urlParams = new URLSearchParams(window.location.search);
        testId = urlParams.get('testId');
        const mode = urlParams.get('mode');
        questionId = urlParams.get('questionId');

        if (!testId) window.location.href = 'teacher.html';
        document.getElementById('backLink').href = `manage-test.html?testId=${testId}`;

        async function init() {
            db = await initDatabase();
            await initEditor();

            if (questionId) {
                const qRes = db.exec("SELECT * FROM test_questions WHERE id = ?", [questionId]);
                if (qRes.length) {
                    const q = qRes[0].values[0];
                    document.getElementById('questionTitle').value = q[2];
                    document.getElementById('fileRequiredCheckbox').checked = !!q[4];
                    const ansRes = db.exec("SELECT answer_text, is_correct FROM test_answers WHERE question_id = ?", [questionId]);
                    if (ansRes.length) {
                        currentAnswers = ansRes[0].values.map(row => ({ text: row[0], isCorrect: !!row[1] }));
                    }
                    renderAnswers();
                    if (q[3]) {
                        try {
                            const data = JSON.parse(q[3]);
                            await editor.isReady;
                            editor.render(data);
                        } catch(e) {}
                    }
                    document.getElementById('formTitle').innerText = 'Редактирование вопроса';
                }
            }
        }

        async function initEditor() {
            editor = new EditorJS({
                holder: 'editorjs',
                tools: {
                    header: { class: Header, config: { placeholder: 'Заголовок' } },
                    list: { class: EditorjsList, inlineToolbar: true },
                    paragraph: { class: Paragraph, inlineToolbar: true },
                    image: { class: Image, config: { endpoints: { byFile: null } } }
                }
            });
        }

        function renderAnswers() {
            const container = document.getElementById('answersList');
            if (currentAnswers.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;">Нет вариантов</p>';
                return;
            }
            container.innerHTML = currentAnswers.map((ans, idx) => `
                <div class="answer-item">
                    <input type="checkbox" ${ans.isCorrect ? 'checked' : ''} data-idx="${idx}" class="answer-correct">
                    <input type="text" class="answer-text" value="${escapeHtml(ans.text)}" data-idx="${idx}">
                    <button class="btn-outline remove-answer" data-idx="${idx}">Удалить</button>
                </div>
            `).join('');
            container.querySelectorAll('.answer-correct').forEach(cb => cb.addEventListener('change', e => {
                currentAnswers[cb.dataset.idx].isCorrect = cb.checked;
            }));
            container.querySelectorAll('.answer-text').forEach(inp => inp.addEventListener('input', e => {
                currentAnswers[inp.dataset.idx].text = inp.value;
            }));
            container.querySelectorAll('.remove-answer').forEach(btn => btn.addEventListener('click', () => {
                currentAnswers.splice(btn.dataset.idx, 1);
                renderAnswers();
            }));
        }

        document.getElementById('addAnswerBtn').addEventListener('click', () => {
            currentAnswers.push({ text: '', isCorrect: false });
            renderAnswers();
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const title = document.getElementById('questionTitle').value.trim();
            if (!title) { alert('Введите заголовок'); return; }
            if (!currentAnswers.length) { alert('Добавьте варианты'); return; }
            if (currentAnswers.some(a => !a.text.trim())) { alert('Заполните варианты'); return; }
            if (!currentAnswers.some(a => a.isCorrect)) { alert('Выберите правильный ответ'); return; }

            const editorData = await editor.save();
            const fileRequired = document.getElementById('fileRequiredCheckbox').checked ? 1 : 0;

            if (questionId) {
                db.run("UPDATE test_questions SET title = ?, editor_data = ?, file_required = ? WHERE id = ?",
                    [title, JSON.stringify(editorData), fileRequired, questionId]);
                db.run("DELETE FROM test_answers WHERE question_id = ?", [questionId]);
            } else {
                questionId = 'q_' + Date.now() + '_' + Math.random().toString(36);
                const posRes = db.exec("SELECT MAX(position) FROM test_questions WHERE test_id = ?", [testId]);
                const pos = (posRes[0].values[0][0] || 0) + 1;
                db.run("INSERT INTO test_questions (id, test_id, title, editor_data, file_required, position) VALUES (?, ?, ?, ?, ?, ?)",
                    [questionId, testId, title, JSON.stringify(editorData), fileRequired, pos]);
            }
            currentAnswers.forEach(ans => {
                db.run("INSERT INTO test_answers (question_id, answer_text, is_correct) VALUES (?, ?, ?)",
                    [questionId, ans.text, ans.isCorrect ? 1 : 0]);
            });
            saveDatabase();
            alert('Сохранено');
            window.location.href = `manage-test.html?testId=${testId}`;
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (confirm('Отменить?')) window.location.href = `manage-test.html?testId=${testId}`;
        });

        function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        init();
    })();
</script>
</body>
</html>
